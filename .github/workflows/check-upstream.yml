name: Check upstream CachyOS-Settings

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get current pin
        id: current
        run: |
          CURRENT=$(jq -r '.commit' upstream-version.json)
          echo "commit=$CURRENT" >> $GITHUB_OUTPUT

      - name: Get upstream HEAD
        id: upstream
        run: |
          LATEST=$(git ls-remote https://github.com/CachyOS/CachyOS-Settings.git refs/heads/master | awk '{print substr($1,1,7)}')
          FULL=$(git ls-remote https://github.com/CachyOS/CachyOS-Settings.git refs/heads/master | awk '{print $1}')
          echo "short=$LATEST" >> $GITHUB_OUTPUT
          echo "full=$FULL" >> $GITHUB_OUTPUT

      - name: Check if update needed
        id: check
        run: |
          if [ "${{ steps.current.outputs.commit }}" = "${{ steps.upstream.outputs.short }}" ]; then
            echo "needed=false" >> $GITHUB_OUTPUT
            echo "Already up to date"
          else
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "Update available: ${{ steps.current.outputs.commit }} -> ${{ steps.upstream.outputs.short }}"
          fi

      - name: Generate upstream diff
        if: steps.check.outputs.needed == 'true'
        id: diff
        run: |
          CURRENT="${{ steps.current.outputs.commit }}"
          FULL="${{ steps.upstream.outputs.full }}"

          # Clone upstream (shallow) and get diff of config files
          git clone --depth=50 https://github.com/CachyOS/CachyOS-Settings.git /tmp/cachyos-settings 2>/dev/null || true
          cd /tmp/cachyos-settings

          DIFF=$(git log --oneline "${CURRENT}..${FULL}" -- etc/ usr/ 2>/dev/null | head -20 || echo "Could not generate diff (commit too old)")
          echo "log<<EOFLOG" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOFLOG" >> $GITHUB_OUTPUT

      - name: Update pin
        if: steps.check.outputs.needed == 'true'
        run: |
          DATE=$(date -u +%Y-%m-%d)
          cat > upstream-version.json << EOF
          {
            "repo": "CachyOS/CachyOS-Settings",
            "commit": "${{ steps.upstream.outputs.short }}",
            "date": "$DATE"
          }
          EOF
          # Clean up whitespace from heredoc
          python3 -c "
          import json
          with open('upstream-version.json') as f:
              data = json.load(f)
          with open('upstream-version.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

      - name: Create PR
        if: steps.check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="upstream-update/${{ steps.upstream.outputs.short }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add upstream-version.json
          git commit -m "chore: bump upstream pin to ${{ steps.upstream.outputs.short }}"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "chore: upstream CachyOS-Settings updated (${{ steps.upstream.outputs.short }})" \
            --body "$(cat <<'PREOF'
          ## Upstream Changes

          Pin: \`${{ steps.current.outputs.commit }}\` -> \`${{ steps.upstream.outputs.short }}\`

          ### Relevant commits
          \`\`\`
          ${{ steps.diff.outputs.log }}
          \`\`\`

          **Action required:** Review upstream config changes and update \`module.nix\` if needed. This module is hand-written — upstream changes need manual translation.

          [View upstream diff](https://github.com/CachyOS/CachyOS-Settings/compare/${{ steps.current.outputs.commit }}...${{ steps.upstream.outputs.full }})
          PREOF
          )"
